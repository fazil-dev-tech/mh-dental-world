<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — MH Dental World</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23DC3558'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='16' font-weight='800' font-family='serif'>MH</text></svg>">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <!-- Supabase CDN must load BEFORE supabase-config.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="admin-login-page">
    <div style="position:absolute;top:-120px;right:-120px;width:400px;height:400px;background:radial-gradient(circle,var(--clr-primary-100) 0%,transparent 70%);border-radius:50%;pointer-events:none"></div>
    <div style="position:absolute;bottom:-80px;left:-80px;width:350px;height:350px;background:radial-gradient(circle,var(--clr-rose) 0%,transparent 70%);border-radius:50%;pointer-events:none"></div>

    <div class="admin-login-card">
      <div class="login-logo">MH</div>
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to MH Dental World Admin Portal</p>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="admin@mhdentalworld.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="login-submit" style="width:100%;margin-top:var(--sp-4)">Sign In</button>
      </form>

      <div style="margin-top:var(--sp-6)">
        <a href="../index.html" style="font-size:var(--fs-sm);color:var(--clr-primary);font-weight:500">← Back to Website</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/supabase-config.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const errorEl = document.getElementById('login-error');
      const submitBtn = document.getElementById('login-submit');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      errorEl.style.display = 'none';
      errorEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px"></span> Signing in...';

      try {
        if (!MH.isSupabaseConfigured()) {
          throw new Error('Database not connected. Please check configuration.');
        }

        const { data, error } = await MH.supabase.auth.signInWithPassword({ email, password });

        if (error) throw error;

        // Successful login — redirect to dashboard
        window.location.href = 'dashboard.html';

      } catch (err) {
        errorEl.textContent = err.message || 'Invalid email or password.';
        errorEl.style.display = 'block';
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
